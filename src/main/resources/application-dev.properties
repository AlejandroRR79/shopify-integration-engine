# 🌱 Fuente de configuración
config.source=DESARROLLO
spring.application.name=shopify-integration-engine
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true


# Fuerza UTF-8 en todo el stack web
spring.http.encoding.enabled=true
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true

# Asegura que Jackson incluya campos nulos y respete UTF-8
spring.jackson.default-property-inclusion=always
spring.jackson.serialization.indent_output=true


logging.charset.name=UTF-8




# ───────────────────────────────────────────────
# 🛍️ Shopify - Configuración principal
# ───────────────────────────────────────────────
shopify.api.version=2025-10
shopify.shop.domain=${SHOPIFY_SHOP_DOMAIN}
shopify.access.token=${SHOPIFY_ACCESS_TOKEN}

# 🧩 Shopify - Datos de la app (uso opcional)
shopify.app.id=${SHOPIFY_APP_ID}
shopify.app.secret=${SHOPIFY_APP_SECRET}

# 📦 Shopify - Webhook para validación de eventos
shopify.webhook.secret=${SHOPIFY_WEBHOOK_SECRET}
shopify.webhook.enabled=false



# Token privado para autenticación
api.access.token=mi-token-secreto

# 📦 Estafeta - Seguimiento de envíos
estafeta.token.url=${ESTAFETA_TOKEN_URL}
estafeta.client.id=${ESTAFETA_CLIENT_ID}
estafeta.client.secret=${ESTAFETA_CLIENT_SECRET}
estafeta.scope=${ESTAFETA_SCOPE}
estafeta.grant.type=${ESTAFETA_GRANT_TYPE}
estafeta.api.url=${ESTAFETA_API_URL}
estafeta.apikey=${ESTAFETA_APIKEY}
estafeta.input.type=${ESTAFETA_INPUT_TYPE}

# 📦 Estafeta - Cobertura
estafeta.cobertura.token.url=${ESTAFETA_COBERTURA_TOKEN_URL}
estafeta.cobertura.client.id=${ESTAFETA_COBERTURA_CLIENT_ID}
estafeta.cobertura.client.secret=${ESTAFETA_COBERTURA_CLIENT_SECRET}
estafeta.cobertura.scope=${ESTAFETA_COBERTURA_SCOPE}
estafeta.cobertura.grant.type=${ESTAFETA_COBERTURA_GRANT_TYPE}
estafeta.cobertura.api.url=${ESTAFETA_COBERTURA_API_URL}
estafeta.cobertura.apikey=${ESTAFETA_COBERTURA_APIKEY}

# 📦 Estafeta - Guía
estafeta.guia.token.url=${ESTAFETA_GUIA_TOKEN_URL}
estafeta.guia.client.id=${ESTAFETA_GUIA_CLIENT_ID}
estafeta.guia.client.secret=${ESTAFETA_GUIA_CLIENT_SECRET}
estafeta.guia.scope=${ESTAFETA_GUIA_SCOPE}
estafeta.guia.grant.type=${ESTAFETA_GUIA_GRANT_TYPE}
estafeta.guia.api.url=${ESTAFETA_GUIA_API_URL}
estafeta.guia.api.query=${ESTAFETA_GUIA_API_QUERY}
estafeta.guia.apikey=${ESTAFETA_GUIA_APIKEY}

estafeta.guia.effective-date.offset-days=10


# Auth
#b2b.auth.url=${B2B_AUTH_URL}
#b2b.auth.idEmpresa=${B2B_AUTH_IDEMPRESA}
#b2b.auth.clave=${B2B_AUTH_CLAVE}
#b2b.auth.password=${B2B_AUTH_PASSWORD}

# Endpoints
#b2b.endpoint.timbre=${B2B_ENDPOINT_TIMBRE}
#b2b.endpoint.timbreIntegrador=${B2B_ENDPOINT_TIMBRE_INT}
#b2b.endpoint.descargaPdf=${B2B_ENDPOINT_DESCARGA_PDF}


spring.mail.host=${SPRING_MAIL_HOST}
spring.mail.port=${SPRING_MAIL_PORT}
spring.mail.username=${SPRING_MAIL_USERNAME}
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_HOST}

# 📧 Correos parametrizados por negocio y operación
app.mail.notificacion.operacion=${MAIL_NOTIFICACION_OPERACION}
app.mail.error.operacion=${MAIL_ERROR_OPERACION}

jwt.secret=${JWT_SECRET}
auth.users.admin.username=${ADMIN_USER}
auth.users.admin.password=${ADMIN_PASS}
# Rate limiting login: max intentos fallidos, ventana y bloqueo en minutos
auth.rate-limit.max-attempts=5
auth.rate-limit.window-minutes=5
auth.rate-limit.block-minutes=15

# B2B Auth para registro de OC
b2b.oc.auth.url=${B2B_OC_AUTH_URL}
b2b.oc.auth.usuario=${B2B_OC_AUTH_USUARIO}
b2b.oc.auth.empresa=${B2B_OC_AUTH_EMPRESA}
b2b.oc.auth.password=${B2B_OC_AUTH_PASSWORD}


# B2B Order (se usará en otro servicio)
b2b.order.url=${B2B_ORDER_URL}

# Configuración de subida de archivos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true

# Credenciales para la app
auth.app.user=admin
auth.app.pass=prueba12345


spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect


b2b.delivery.base.url	= ${B2B_BASE_URL}
b2b.delivery.usuario	=${B2B_DELIVERY_USUARIO}
b2b.delivery.cve-estatus-odc	=${B2B_DELIVERY_CVE_ESTATUS_ODC}
b2b.delivery.id-sucursal-cliente=${B2B_DELIVERY_ID_SUCURSAL_CLIENTE}
# ───────────────────────────────────────────────
# 📦 B2B Delivery Endpoints
# ───────────────────────────────────────────────
b2b.delivery.endpoint.seguimiento=/Dataservices/proveedores/delivery/seguimientoEntrega
b2b.delivery.endpoint.actualizar=/Dataservices/proveedores/delivery/actualizarEstatusDelivery
b2b.delivery.endpoint.facturar=/Dataservices/proveedores/facturacion/facturarOrdenCompraCt
b2b.delivery.usuarioFacturacion=SRV_AUTO
#______________________________________________
# Estatus a considerar para consulta en B2B
#______________________________________________
b2b.seguimiento.estatus=transito,recoleccion,devolucion


estafeta.cron.exp=${ESTAFETA_CRON_EXP:0 0 0/3 * * ?}
# Default: cada 3 horas

# ───────────────────────────────────────────────
# 🔀 Tracking Pipeline Mode
# ───────────────────────────────────────────────
# b2b = REST client hacia B2B (activo por defecto)
# dao = Base de datos — activar cuando DeliveryDAO esté implementado
tracking.mode=dao

# ───────────────────────────────────────────────
# 🧱 Build info (inyectado por Maven)
# ───────────────────────────────────────────────
app.build.name=@project.artifactId@
app.build.version=@project.version@
app.build.date=@build.date@

# ================================
# ESTAFETA SEGURO
# ================================

estafeta.seguro.token.url=${ESTAFETA_SEGURO_TOKEN_URL}
estafeta.seguro.client.id=${ESTAFETA_SEGURO_CLIENT_ID}
estafeta.seguro.client.secret=${ESTAFETA_SEGURO_CLIENT_SECRET}
estafeta.seguro.scope=${ESTAFETA_SEGURO_SCOPE}
estafeta.seguro.grant.type=${ESTAFETA_SEGURO_GRANT_TYPE}
estafeta.seguro.api.url=${ESTAFETA_SEGURO_API_URL}
estafeta.seguro.apikey=${ESTAFETA_SEGURO_APIKEY}

# ================================
# NUMERO DE PRODUCTOS A PROCESAR POR BLOQUE
# ================================
shopify.bulk.chunk-size=50


# 🔥 Estatus ODC a facturar (por CVE)
facturacion.estatus.odc=embarcada,entregaSucursal

# 🔥 Cron
#facturacion.cron.exp=0 0 8 * * ?
facturacion.cron.exp=0 0/1 * * * ?

b2b.seguimiento.estatus.delivery=


# =========================================================
# SKYDROPX
# =========================================================

skydropx.base-url=${SKYDROPX_BASE_URL}
skydropx.auth-url=${SKYDROPX_AUTH_URL}

skydropx.client-id=${SKYDROPX_CLIENT_ID}
skydropx.client-secret=${SKYDROPX_CLIENT_SECRET}

skydropx.grant-type=client_credentials


skydropx.requested-carriers=estafeta,fedex,dhl,paquetexpress
# =========================================================
# CONFIGURACION TECNICA
# =========================================================

skydropx.timeout-ms=60000
skydropx.token-refresh-buffer=300

# =========================================================
# WEBHOOK HMAC SKYDROPX - CONTIZACION
# =========================================================

skydropx.webhook.hmac-secret=${SKYDROPX_WEBHOOK_HMAC_SECRET}
skydropx.selection.priority=PRICE
skydropx.selection.allowed-service-types=standard,express

# ==========================================
# SKYDROPX SHIPMENT
# ==========================================

skydropx.shipment.printing-format=standard
skydropx.shipment.package-type=4G
skydropx.shipment.country-code=MX
skydropx.shipment.consignment-note=53102400

##################################################
# SKYDROPX TOKEN CACHE
##################################################

skydropx.auth.token-expiration-seconds=3300
##################################################
# SKYDROPX SHIPMENT POLLING
# Cuántas veces se consulta SkyDropX esperando
# que el shipment quede en status "success"
# con label disponible antes de lanzar error.
##################################################

# Número máximo de intentos de polling para el shipment
skydropx.shipment.polling.max-attempts=10
# Segundos de espera entre cada intento de polling del shipment
skydropx.shipment.polling.delay-seconds=10

##################################################
# SKYDROPX QUOTATION POLLING
# Cuántas veces se consulta SkyDropX esperando
# que la cotización quede completada (is_completed=true)
# antes de abortar la selección de tarifa.
##################################################

# Número máximo de intentos de polling para la quotation
skydropx.quotation.polling.max-attempts=3
# Segundos de espera entre cada intento de polling de la quotation
skydropx.quotation.polling.delay-seconds=10

# =========================================================
# SKYDROPX RECOVERY JOB
# Recupera procesos atorados en QUOTATION_REQUESTED,
# QUOTATION_COMPLETED o RATE_SELECTED
# =========================================================
# Cron de ejecucion (cada 5 minutos)
skydropx.recovery.cron.exp=0 0/5 * * * ?
# Minutos sin actualizacion para considerar un proceso atorado
skydropx.recovery.stuck-minutes=10
# Maximo de reintentos antes de marcar como FAILED
skydropx.recovery.max-retries=3
# Maximo de procesos a recuperar por ciclo (evita OOM en volumen alto)
skydropx.recovery.batch-size=50

# =========================================================
# GUIA UNIFICADA - Prelacion de carriers
# Valores posibles (case-insensitive, separados por coma):
#   Estafeta,Skydropx  → intenta Estafeta primero, fallback a SkyDropX
#   Skydropx,Estafeta  → intenta SkyDropX primero, fallback a Estafeta
#   Estafeta           → solo Estafeta
#   Skydropx           → solo SkyDropX
# =========================================================
guia.prelacion=Estafeta,SkyDropX

# =========================================================
# 🏪 MULTI-TIENDA — Shopify Multi-Store Config
# Clase: ShopifyMultiStoreProperties
# auth-type: TOKEN (acceso directo) | OAUTH (client_id + secret)
# =========================================================

# ── [0] Tienda MX — token estático (mismas creds que config principal)
shopify.stores[0].alias=tienda-mx
shopify.stores[0].domain=${SHOPIFY_SHOP_DOMAIN}
shopify.stores[0].api-version=2025-10
shopify.stores[0].auth-type=TOKEN
shopify.stores[0].access-token=${SHOPIFY_ACCESS_TOKEN}
shopify.stores[0].bulk-chunk-size=50

# ── [1] Tienda ENL Nómina — OAuth con client_id + secret
shopify.stores[1].alias=${SHOPIFY_ENL_NOMINA_ALIAS}
shopify.stores[1].domain=${SHOPIFY_ENL_NOMINA_DOMAIN}
shopify.stores[1].api-version=2025-10
shopify.stores[1].auth-type=OAUTH
shopify.stores[1].client-id=${SHOPIFY_ENL_NOMINA_CLIENT_ID}
shopify.stores[1].client-secret=${SHOPIFY_ENL_NOMINA_CLIENT_SECRET}
shopify.stores[1].token-url=${SHOPIFY_ENL_NOMINA_TOKEN_URL}
shopify.stores[1].bulk-chunk-size=50
shopify.stores[1].orders-access-token=${SHOPIFY_ENL_NOMINA_ORDERS_TOKEN:}